# docker-compose.yml
# NOTE: PostgreSQL runs on the HOST, not inside Docker.
# The backend container connects to the host's PostgreSQL via host.docker.internal.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: product-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override DB host to reach PostgreSQL on the host machine
      DATABASE_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: product-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
